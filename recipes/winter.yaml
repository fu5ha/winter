---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: winter
description: My personal OS image.

base-image: ghcr.io/ublue-os/bazzite-nvidia-open
image-version: stable-44

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
    - from-file: modules/system-files.yaml
    - from-file: modules/nix.yaml
    - from-file: modules/dnf.yaml
    - from-file: modules/default-flatpaks.yaml
    - from-file: modules/signing.yaml
