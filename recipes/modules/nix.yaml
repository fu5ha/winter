---
# yaml-language-server: $schema=https://schema.blue-build.org/module-list-v1.json

modules:
  - type: files
    files:
      - source: nix-tmpfiles
        destination: /usr/lib/tmpfiles.d/

  - type: systemd
    system:
      enabled:
        - var-nix.service
        - nix.mount

  - type: dnf
    install:
      packages:
        - nix
        - nix-daemon # nix multi-user/systemd install

  - type: systemd
    system:
      enabled:
        - nix-daemon
